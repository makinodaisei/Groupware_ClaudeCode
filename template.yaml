AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Groupware MVP - AWS SAM Template
  Internal groupware: Schedule, Facility Reservation, Document Management, User Management

# ---------- Parameters ----------
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
    Description: Deployment environment


# ---------- Globals ----------
Globals:
  Function:
    Runtime: python3.11
    Architectures: [x86_64]
    MemorySize: 256
    Timeout: 29
    Layers:
      - !Ref CommonLayer
    Environment:
      Variables:
        TABLE_NAME: !Ref GroupwareTable
        BUCKET_NAME: !Ref DocumentsBucket
        ENVIRONMENT: !Ref Environment
        USER_POOL_ID: !Ref CognitoUserPool
    Tracing: Active

# ---------- Resources ----------
Resources:

  # ===== Cognito =====
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "groupware-${Environment}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: role
          AttributeDataType: String
          Required: false
          Mutable: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "groupware-client-${Environment}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  AdminUserGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref CognitoUserPool
      Description: Administrators with full access

  RegularUserGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: user
      UserPoolId: !Ref CognitoUserPool
      Description: Regular users

  CognitoUserPoolGroupEditor:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: editor
      UserPoolId: !Ref CognitoUserPool
      Description: Editors can write documents and manage reservations

  # ===== API Gateway =====
  GroupwareApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}"
              audience:
                - !Ref CognitoUserPoolClient
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Api-Key
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600

  # ===== Lambda Layer =====
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "groupware-common-${Environment}"
      Description: Shared utilities for all Groupware Lambda functions
      ContentUri: backend/layers/common/python/
      CompatibleRuntimes:
        - python3.11
      CompatibleArchitectures:
        - x86_64
    Metadata:
      BuildMethod: python3.11

  # ===== Lambda Functions =====
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "groupware-users-${Environment}"
      CodeUri: backend/functions/users/
      Handler: handler.lambda_handler
      Description: User management via Cognito
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroupwareTable
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminCreateUser
              - cognito-idp:AdminDeleteUser
              - cognito-idp:AdminAddUserToGroup
              - cognito-idp:AdminRemoveUserFromGroup
              - cognito-idp:AdminGetUser
              - cognito-idp:AdminUpdateUserAttributes
              - cognito-idp:ListUsers
              - cognito-idp:ListUsersInGroup
              - cognito-idp:AdminEnableUser
              - cognito-idp:AdminDisableUser
            Resource: !GetAtt CognitoUserPool.Arn
      Events:
        UsersGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /users
            Method: GET
        UsersPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /users
            Method: POST
        UsersProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /users/{proxy+}
            Method: GET
        UsersProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /users/{proxy+}
            Method: PUT
        UsersProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /users/{proxy+}
            Method: DELETE

  SchedulesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "groupware-schedules-${Environment}"
      CodeUri: backend/functions/schedules/
      Handler: handler.lambda_handler
      Description: Schedule management with monthly/weekly view
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroupwareTable
      Events:
        SchedulesGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /schedules
            Method: GET
        SchedulesPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /schedules
            Method: POST
        SchedulesProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /schedules/{proxy+}
            Method: GET
        SchedulesProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /schedules/{proxy+}
            Method: PUT
        SchedulesProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /schedules/{proxy+}
            Method: DELETE

  FacilitiesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "groupware-facilities-${Environment}"
      CodeUri: backend/functions/facilities/
      Handler: handler.lambda_handler
      Description: Facility reservation with exclusive control
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroupwareTable
      Events:
        FacilitiesGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities
            Method: GET
        FacilitiesPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities
            Method: POST
        FacilitiesProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities/{proxy+}
            Method: GET
        FacilitiesProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities/{proxy+}
            Method: POST
        FacilitiesProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities/{proxy+}
            Method: DELETE
        FacilitiesProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /facilities/{proxy+}
            Method: PUT

  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "groupware-documents-${Environment}"
      CodeUri: backend/functions/documents/
      Handler: handler.lambda_handler
      Description: Document management with S3 presigned URLs
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GroupwareTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        DocumentsProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /documents/{proxy+}
            Method: GET
        DocumentsProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /documents/{proxy+}
            Method: POST
        DocumentsProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref GroupwareApi
            Path: /documents/{proxy+}
            Method: DELETE
        # S3Upload event is set up post-deployment via CLI to avoid circular dependency

  # ===== DynamoDB =====
  GroupwareTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "groupware-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: DateRangeIndex
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ReservationByDateIndex
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UserByEmailIndex
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ===== S3 =====
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "groupware-docs-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub "${DocumentsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false


# ---------- Outputs ----------
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${GroupwareApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "groupware-${Environment}-UserPoolId"

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "groupware-${Environment}-UserPoolClientId"

  TableName:
    Description: DynamoDB table name
    Value: !Ref GroupwareTable
    Export:
      Name: !Sub "groupware-${Environment}-TableName"

  BucketName:
    Description: S3 bucket name for documents
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub "groupware-${Environment}-BucketName"
