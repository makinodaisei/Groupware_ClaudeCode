name: Deploy to Prod

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: SAM Deploy (prod)
    runs-on: ubuntu-latest
    environment: prod   # GitHub Environment with required reviewers for approval gate

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: SAM Build
        run: sam build --parallel --cached

      - name: SAM Deploy (prod)
        run: |
          sam deploy \
            --config-env prod \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Environment=prod" \
              "CognitoUserPoolId=${{ secrets.PROD_COGNITO_USER_POOL_ID }}" \
              "CognitoUserPoolClientId=${{ secrets.PROD_COGNITO_USER_POOL_CLIENT_ID }}"

      - name: Output stack info
        run: |
          aws cloudformation describe-stacks \
            --stack-name groupware-prod \
            --query 'Stacks[0].Outputs' \
            --output table

  generate-release-docs:
    name: Generate & Publish Release Docs
    runs-on: ubuntu-latest
    needs: deploy-prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc dependencies
        run: pip install openpyxl pyyaml

      - name: Generate Excel artifacts
        run: python tools/md2excel.py --all

      - name: Upload Excel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: excel-docs-prod-${{ github.sha }}
          path: artifacts/*.xlsx
          retention-days: 90

      - name: Create GitHub Release with docs
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.xlsx
          generate_release_notes: true
