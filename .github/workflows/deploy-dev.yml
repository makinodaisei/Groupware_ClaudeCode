name: Deploy to Dev

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: SAM Deploy (dev)
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: SAM Build
        run: sam build --parallel --cached

      - name: SAM Deploy (dev)
        run: |
          sam deploy \
            --config-env dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "Environment=dev"

      - name: Configure S3 Lambda trigger (post-deploy, avoids circular dependency)
        run: |
          FUNC_ARN=$(aws lambda get-function --function-name groupware-documents-dev --query 'Configuration.FunctionArn' --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission \
            --function-name groupware-documents-dev \
            --statement-id s3-invoke \
            --action lambda:InvokeFunction \
            --principal s3.amazonaws.com \
            --source-arn "arn:aws:s3:::groupware-docs-dev-${ACCOUNT_ID}" 2>/dev/null || true
          aws s3api put-bucket-notification-configuration \
            --bucket "groupware-docs-dev-${ACCOUNT_ID}" \
            --notification-configuration "{\"LambdaFunctionConfigurations\":[{\"LambdaFunctionArn\":\"${FUNC_ARN}\",\"Events\":[\"s3:ObjectCreated:*\"],\"Filter\":{\"Key\":{\"FilterRules\":[{\"Name\":\"prefix\",\"Value\":\"uploads/\"}]}}}]}"

      - name: Output stack info
        run: |
          aws cloudformation describe-stacks \
            --stack-name groupware-dev \
            --query 'Stacks[0].Outputs' \
            --output table

  generate-docs:
    name: Generate Excel Docs
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc dependencies
        run: pip install openpyxl pyyaml

      - name: Generate Excel artifacts
        run: python tools/md2excel.py --all

      - name: Upload Excel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: excel-docs-dev-${{ github.sha }}
          path: artifacts/*.xlsx
          retention-days: 30
