name: Deploy to Dev

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: SAM Deploy (dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: SAM Build
        run: sam build --parallel --cached

      - name: SAM Deploy (dev)
        run: |
          sam deploy \
            --config-env dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "Environment=dev"

      - name: Configure S3 Lambda trigger (post-deploy, avoids circular dependency)
        run: |
          FUNC_ARN=$(aws lambda get-function --function-name groupware-documents-dev --query 'Configuration.FunctionArn' --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission \
            --function-name groupware-documents-dev \
            --statement-id s3-invoke \
            --action lambda:InvokeFunction \
            --principal s3.amazonaws.com \
            --source-arn "arn:aws:s3:::groupware-docs-dev-${ACCOUNT_ID}" 2>/dev/null || true
          aws s3api put-bucket-notification-configuration \
            --bucket "groupware-docs-dev-${ACCOUNT_ID}" \
            --notification-configuration "{\"LambdaFunctionConfigurations\":[{\"LambdaFunctionArn\":\"${FUNC_ARN}\",\"Events\":[\"s3:ObjectCreated:*\"],\"Filter\":{\"Key\":{\"FilterRules\":[{\"Name\":\"prefix\",\"Value\":\"uploads/\"}]}}}]}"

      - name: Output stack info
        run: |
          aws cloudformation describe-stacks \
            --stack-name groupware-dev \
            --query 'Stacks[0].Outputs' \
            --output table

  frontend-deploy:
    name: Frontend Deploy (S3)
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy JS (application/javascript)
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://groupware-frontend-dev-629574119223/ \
            --delete \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript"

      - name: Deploy CSS (text/css)
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://groupware-frontend-dev-629574119223/ \
            --exclude "*" --include "*.css" \
            --content-type "text/css"

      - name: Deploy HTML (text/html)
        working-directory: frontend
        run: |
          aws s3 cp dist/index.html s3://groupware-frontend-dev-629574119223/index.html \
            --content-type "text/html; charset=utf-8"

  generate-docs:
    name: Generate Excel Docs
    runs-on: ubuntu-latest
    needs: [deploy-dev, frontend-deploy]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc dependencies
        run: pip install openpyxl pyyaml

      - name: Generate Excel artifacts
        run: python tools/md2excel.py --all

      - name: Upload Excel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: excel-docs-dev-${{ github.sha }}
          path: artifacts/*.xlsx
          retention-days: 30
