<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社内グループウェア MVP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3748; }
    header { background: #1a365d; color: white; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; }
    nav { display: flex; gap: 1rem; }
    nav button { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    nav button.active, nav button:hover { background: rgba(255,255,255,0.15); }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.1rem; color: #1a365d; margin-bottom: 1rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .stat-box { background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; border-radius: 10px; padding: 1.25rem; text-align: center; }
    .stat-box .num { font-size: 2rem; font-weight: bold; }
    .stat-box .label { font-size: 0.85rem; opacity: 0.85; margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #edf2f7; text-align: left; padding: 0.6rem 0.8rem; font-weight: 600; }
    td { padding: 0.6rem 0.8rem; border-bottom: 1px solid #e2e8f0; }
    tr:hover td { background: #f7fafc; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #c6f6d5; color: #276749; }
    .badge-blue { background: #bee3f8; color: #2c5282; }
    .badge-orange { background: #feebc8; color: #7b341e; }
    .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .btn-primary { background: #2b6cb0; color: white; }
    .btn-primary:hover { background: #1a365d; }
    .section { display: none; }
    .section.active { display: block; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 2.5rem; width: 360px; text-align: center; }
    .login-box h2 { color: #1a365d; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #4a5568; }
    .form-group input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; }
    .form-group input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.15); }
    #app { display: none; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e2e8f0; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .cal-header { background: #2b6cb0; color: white; text-align: center; padding: 0.5rem; font-weight: 600; font-size: 0.8rem; }
    .cal-day { background: white; min-height: 80px; padding: 0.4rem; font-size: 0.8rem; }
    .cal-day .day-num { font-weight: 600; color: #4a5568; }
    .cal-day.today { background: #ebf8ff; }
    .cal-day.today .day-num { color: #2b6cb0; }
    .cal-event { background: #bee3f8; color: #2c5282; border-radius: 3px; padding: 0.15rem 0.3rem; margin-top: 0.2rem; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .cal-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .cal-nav h3 { font-size: 1.1rem; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:2.5rem; margin-bottom:0.5rem;">🏢</div>
    <h2>社内グループウェア</h2>
    <p style="color:#718096; font-size:0.9rem; margin-bottom:1.5rem;">ログインしてください</p>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="email" placeholder="user@example.com" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="login()">ログイン</button>
    <p id="login-error" style="color:#e53e3e; font-size:0.85rem; margin-top:0.75rem; display:none;"></p>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>🏢 社内グループウェア</h1>
    <nav>
      <button onclick="showSection('dashboard')" id="nav-dashboard" class="active">ダッシュボード</button>
      <button onclick="showSection('schedule')" id="nav-schedule">スケジュール</button>
      <button onclick="showSection('facility')" id="nav-facility">施設予約</button>
      <button onclick="showSection('documents')" id="nav-documents">文書管理</button>
      <button onclick="showSection('users')" id="nav-users" id="admin-only" style="display:none;">ユーザー管理</button>
      <button onclick="logout()" style="border-color:rgba(255,100,100,0.5); color:#fed7d7;">ログアウト</button>
    </nav>
  </header>

  <main>
    <!-- Dashboard -->
    <div id="section-dashboard" class="section active">
      <div class="grid" style="margin-bottom:1.5rem;">
        <div class="stat-box"><div class="num" id="stat-events">-</div><div class="label">今月のスケジュール</div></div>
        <div class="stat-box"><div class="num" id="stat-reservations">-</div><div class="label">今日の施設予約</div></div>
        <div class="stat-box"><div class="num" id="stat-docs">-</div><div class="label">文書フォルダ数</div></div>
        <div class="stat-box"><div class="num" id="stat-users">-</div><div class="label">ユーザー数</div></div>
      </div>
      <div class="card">
        <h2>直近のスケジュール</h2>
        <table>
          <thead><tr><th>日時</th><th>タイトル</th><th>場所</th><th>種別</th></tr></thead>
          <tbody id="recent-events"><tr><td colspan="4" style="text-align:center; color:#a0aec0; padding:2rem;">読み込み中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Schedule -->
    <div id="section-schedule" class="section">
      <div class="card">
        <div class="cal-nav">
          <button class="btn btn-primary" onclick="prevMonth()">◀</button>
          <h3 id="cal-title"></h3>
          <button class="btn btn-primary" onclick="nextMonth()">▶</button>
          <button class="btn btn-primary" onclick="showAddEventModal()" style="margin-left:auto;">＋ 追加</button>
        </div>
        <div class="calendar-grid" id="calendar">
          <div class="cal-header">日</div><div class="cal-header">月</div>
          <div class="cal-header">火</div><div class="cal-header">水</div>
          <div class="cal-header">木</div><div class="cal-header">金</div>
          <div class="cal-header">土</div>
        </div>
      </div>
    </div>

    <!-- Facility -->
    <div id="section-facility" class="section">
      <div class="card">
        <h2>施設一覧・予約状況</h2>
        <div id="facility-list" style="color:#a0aec0;">読み込み中...</div>
      </div>
    </div>

    <!-- Documents -->
    <div id="section-documents" class="section">
      <div class="card">
        <h2>文書管理</h2>
        <div style="display:flex; gap:1rem; margin-bottom:1rem;">
          <button class="btn btn-primary" onclick="createFolder()">＋ フォルダ作成</button>
          <button class="btn btn-primary" onclick="uploadFile()">⬆ ファイルアップロード</button>
        </div>
        <div id="folder-tree" style="color:#a0aec0;">読み込み中...</div>
      </div>
    </div>

    <!-- Users (Admin only) -->
    <div id="section-users" class="section">
      <div class="card">
        <h2>ユーザー管理</h2>
        <button class="btn btn-primary" style="margin-bottom:1rem;" onclick="inviteUser()">＋ ユーザー招待</button>
        <table>
          <thead><tr><th>名前</th><th>メール</th><th>ロール</th><th>ステータス</th></tr></thead>
          <tbody id="user-list"><tr><td colspan="4" style="text-align:center; color:#a0aec0; padding:2rem;">読み込み中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  // ===== Configuration =====
  const CONFIG = {
    // Replace with actual values after SAM deploy
    apiEndpoint: localStorage.getItem('gw_api_endpoint') || '',
    userPoolId: localStorage.getItem('gw_user_pool_id') || '',
    clientId: localStorage.getItem('gw_client_id') || '',
  };

  let currentUser = null;
  let idToken = null;
  let currentMonth = new Date();

  // ===== Auth =====
  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!CONFIG.apiEndpoint) {
      // Demo mode: show app without real auth
      showApp({ email, name: email.split('@')[0], role: 'user' }, 'demo-token');
      return;
    }

    try {
      const resp = await fetch(`https://cognito-idp.ap-northeast-1.amazonaws.com/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-amz-json-1.1',
          'X-Amz-Target': 'AWSCognitoIdentityProviderService.InitiateAuth',
        },
        body: JSON.stringify({
          AuthFlow: 'USER_PASSWORD_AUTH',
          ClientId: CONFIG.clientId,
          AuthParameters: { USERNAME: email, PASSWORD: password },
        }),
      });
      const data = await resp.json();
      if (data.AuthenticationResult) {
        const token = data.AuthenticationResult.IdToken;
        const payload = JSON.parse(atob(token.split('.')[1]));
        showApp({ email, name: payload.name || email, role: (payload['cognito:groups'] || ['user'])[0] }, token);
      } else {
        showError(data.message || 'ログインに失敗しました');
      }
    } catch (e) {
      showError('接続エラー: ' + e.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showApp(user, token) {
    currentUser = user;
    idToken = token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (user.role === 'admin') {
      document.getElementById('nav-users').style.display = '';
    }
    loadDashboard();
    renderCalendar();
  }

  function logout() {
    currentUser = null;
    idToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ===== API Helper =====
  async function api(method, path, body) {
    const url = CONFIG.apiEndpoint + path;
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
    };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    return resp.json().catch(() => ({}));
  }

  // ===== Navigation =====
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');

    if (name === 'schedule') renderCalendar();
    if (name === 'facility') loadFacilities();
    if (name === 'documents') loadDocuments();
    if (name === 'users') loadUsers();
  }

  // ===== Dashboard =====
  async function loadDashboard() {
    const now = new Date();
    const month = now.toISOString().slice(0, 7);
    const today = now.toISOString().slice(0, 10);

    try {
      const schedules = await api('GET', `/schedules?month=${month}`);
      document.getElementById('stat-events').textContent = schedules.count ?? '-';
      const rows = (schedules.events || []).slice(0, 5).map(e => `
        <tr>
          <td>${e.startDatetime?.slice(0, 16).replace('T', ' ')}</td>
          <td>${e.title}</td>
          <td>${e.location || '-'}</td>
          <td><span class="badge ${e.isPublic ? 'badge-blue' : 'badge-orange'}">${e.isPublic ? '公開' : '非公開'}</span></td>
        </tr>`).join('');
      document.getElementById('recent-events').innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:1rem;">スケジュールなし</td></tr>';
    } catch (e) {
      document.getElementById('recent-events').innerHTML = '<tr><td colspan="4">読み込みエラー</td></tr>';
    }

    document.getElementById('stat-reservations').textContent = '-';
    document.getElementById('stat-docs').textContent = '-';
    document.getElementById('stat-users').textContent = '-';
  }

  // ===== Calendar =====
  function renderCalendar() {
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth();
    document.getElementById('cal-title').textContent = `${y}年 ${m + 1}月`;

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const today = new Date();

    const grid = document.getElementById('calendar');
    // Remove day cells (keep 7 header cells)
    while (grid.children.length > 7) grid.removeChild(grid.lastChild);

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-day';
      blank.style.background = '#f7fafc';
      grid.appendChild(blank);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
      cell.className = 'cal-day' + (isToday ? ' today' : '');
      cell.innerHTML = `<div class="day-num">${d}</div>`;
      grid.appendChild(cell);
    }

    // Load events for month
    const monthStr = `${y}-${String(m + 1).padStart(2, '0')}`;
    api('GET', `/schedules?month=${monthStr}`).then(data => {
      (data.events || []).forEach(event => {
        const day = parseInt(event.startDatetime?.slice(8, 10));
        const idx = firstDay + day - 1 + 7; // +7 for headers
        if (grid.children[idx]) {
          const el = document.createElement('div');
          el.className = 'cal-event';
          el.title = event.title;
          el.textContent = event.title;
          grid.children[idx].appendChild(el);
        }
      });
    }).catch(() => {});
  }

  function prevMonth() { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); }
  function nextMonth() { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); }

  function showAddEventModal() {
    const title = prompt('イベントタイトル:');
    if (!title) return;
    const start = prompt('開始日時 (例: 2026-03-15T10:00:00+09:00):');
    const end = prompt('終了日時 (例: 2026-03-15T11:00:00+09:00):');
    if (!start || !end) return;
    api('POST', '/schedules', { title, startDatetime: start, endDatetime: end })
      .then(() => renderCalendar())
      .catch(e => alert('エラー: ' + e.message));
  }

  // ===== Facilities =====
  async function loadFacilities() {
    try {
      const data = await api('GET', '/facilities');
      const html = (data.facilities || []).map(f => `
        <div class="card" style="margin-bottom:1rem;">
          <strong>${f.name}</strong> <span style="color:#718096; font-size:0.85rem;">収容: ${f.capacity}名 | ${f.location || '場所未設定'}</span>
          <p style="color:#718096; font-size:0.85rem; margin-top:0.3rem;">${f.description || ''}</p>
          <button class="btn btn-primary" style="margin-top:0.75rem; font-size:0.8rem;" onclick="reserveFacility('${f.facilityId}', '${f.name}')">予約する</button>
        </div>`).join('');
      document.getElementById('facility-list').innerHTML = html || '<p style="color:#a0aec0;">施設が登録されていません</p>';
    } catch (e) {
      document.getElementById('facility-list').innerHTML = '<p>読み込みエラー</p>';
    }
  }

  async function reserveFacility(facilityId, name) {
    const title = prompt(`「${name}」の予約タイトル:`);
    if (!title) return;
    const start = prompt('開始日時 (例: 2026-03-15T10:00:00+09:00):');
    const end = prompt('終了日時 (例: 2026-03-15T11:00:00+09:00):');
    if (!start || !end) return;
    const result = await api('POST', `/facilities/${facilityId}/reservations`, { title, startDatetime: start, endDatetime: end });
    if (result.error === 'CONFLICT') {
      alert('その時間帯は既に予約されています。別の時間を選択してください。');
    } else if (result.reservationId) {
      alert('予約が完了しました！');
    } else {
      alert('エラーが発生しました: ' + (result.message || 'Unknown'));
    }
  }

  // ===== Documents =====
  async function loadDocuments() {
    try {
      const data = await api('GET', '/documents/folders');
      const html = (data.folders || []).map(f => `
        <div style="padding:0.5rem; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; gap:0.5rem;">
          <span>📁</span>
          <span>${f.name}</span>
          <span style="color:#a0aec0; font-size:0.8rem;">${f.path}</span>
          <button class="btn btn-primary" style="font-size:0.75rem; margin-left:auto;" onclick="viewFolder('${f.folderId}', '${f.name}')">開く</button>
        </div>`).join('');
      document.getElementById('folder-tree').innerHTML = html || '<p style="color:#a0aec0;">フォルダなし</p>';
    } catch (e) {
      document.getElementById('folder-tree').innerHTML = '<p>読み込みエラー</p>';
    }
  }

  async function createFolder() {
    const name = prompt('フォルダ名:');
    if (!name) return;
    await api('POST', '/documents/folders', { name });
    loadDocuments();
  }

  async function uploadFile() {
    alert('ファイルをアップロードするには、まずフォルダを開いてください。');
  }

  async function viewFolder(folderId, folderName) {
    const data = await api('GET', `/documents/folders/${folderId}/files`);
    const files = data.files || [];
    const fileList = files.map(f => `• ${f.name} (${f.status})`).join('\n') || 'ファイルなし';
    alert(`📁 ${folderName}\n\n${fileList}`);
  }

  // ===== Users (Admin) =====
  async function loadUsers() {
    try {
      const data = await api('GET', '/users');
      const rows = (data.users || []).map(u => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-orange' : 'badge-green'}">${u.role}</span></td>
          <td><span class="badge ${u.enabled ? 'badge-green' : 'badge-orange'}">${u.status || (u.enabled ? '有効' : '無効')}</span></td>
        </tr>`).join('');
      document.getElementById('user-list').innerHTML = rows || '<tr><td colspan="4" style="text-align:center;">ユーザーなし</td></tr>';
    } catch (e) {
      document.getElementById('user-list').innerHTML = '<tr><td colspan="4">読み込みエラー</td></tr>';
    }
  }

  async function inviteUser() {
    const email = prompt('招待するメールアドレス:');
    if (!email) return;
    const name = prompt('表示名:');
    if (!name) return;
    const role = confirm('管理者権限を付与しますか？') ? 'admin' : 'user';
    const result = await api('POST', '/users', { email, name, role });
    if (result.userId) {
      alert(`ユーザー「${name}」を招待しました。招待メールが送信されます。`);
      loadUsers();
    } else {
      alert('エラー: ' + (result.message || 'Unknown'));
    }
  }

  // ===== Init =====
  // Auto-login if token exists (demo mode)
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
      login();
    }
  });
</script>
</body>
</html>
